<!doctype html>
<html lang="ja">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gel-banana LP</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;

      background: #fbf6e8;
      color: #151515;
    }
    main {
      width: min(680px, calc(100% - 48px));
    }
    img {
      width: 56px;
      height: 56px;
      object-fit: contain;
    }
    h1 {
      font-size: clamp(32px, 6vw, 56px);
      line-height: 1.05;
      margin: 18px 0 14px;
    }
    p {
      color: #555;
      line-height: 1.8;
      margin: 0 0 28px;
    }
    .links {
      display: grid;
      gap: 12px;
    }
    a {
      display: block;
      padding: 18px 20px;
      border: 2px solid #151515;
      border-radius: 14px;
      color: inherit;
      text-decoration: none;
      background: #fff;
      font-weight: 800;
      box-shadow: 6px 6px 0 #151515;
    }
    a:first-child {
      background: #f8bf2f;
    }

</head>
